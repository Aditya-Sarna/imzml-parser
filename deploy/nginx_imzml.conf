# /etc/nginx/sites-available/imzml
# Reverse proxy for imzmlparser.com
# Certbot will add SSL directives automatically.

server {
    listen 80;
    server_name imzmlparser.com www.imzmlparser.com;

    # Increase timeouts — loading a 830 MB dataset can take 30-60 s
    proxy_connect_timeout  10s;
    proxy_read_timeout    120s;
    proxy_send_timeout     60s;

    # Forward all traffic to the C++ server
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Allow large binary responses (spectra data, tile images)
        proxy_buffering           off;
        proxy_max_temp_file_size  0;
    }
}
