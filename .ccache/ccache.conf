# ccache project-level config (ccache >= 4.0 reads this file when
# CCACHE_CONFIGPATH is unset and the cache dir is set to .ccache/ at
# the repo root — which is what the CI preset and the workflow do).
#
# Developers who want a global cache keep their ~/.config/ccache/ccache.conf;
# these settings only apply when CCACHE_DIR points here.

max_size = 500M
compression = true
compression_level = 6

# Allow slightly stale mtime checks so header-only changes that don't
# affect compilation still yield cache hits.
sloppiness = time_macros,include_file_mtime,pch_defines

# Keep a symlink-based stats file so parallel builds don't fight over it
stats_log = .ccache/stats.log

# Uncomment to debug cache misses:
# log_file = .ccache/debug.log
